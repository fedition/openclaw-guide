<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虾逛 · 数据看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root { --primary: #e74c3c; --bg: #f8f9fa; --card: #fff; --text: #1a1a1a; --muted: #888; --border: #eee; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }

    .topbar { background: #1a1a1a; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 18px; font-weight: 700; }
    .topbar h1 span { color: var(--primary); }

    .controls { display: flex; gap: 8px; align-items: center; }
    .controls select, .controls button, .controls input[type="date"] {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #444;
      background: #2a2a2a; color: #fff; font-size: 13px; cursor: pointer;
      color-scheme: dark;
    }
    .controls button { background: var(--primary); border-color: var(--primary); font-weight: 600; }
    .controls button:hover { background: #c0392b; }

    .dashboard { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Stat Cards */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card); border-radius: 12px; padding: 20px 24px;
      border: 1px solid var(--border);
    }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-value { font-size: 32px; font-weight: 800; }
    .stat-value.primary { color: var(--primary); }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    .chart-card {
      background: var(--card); border-radius: 12px; padding: 20px 24px;
      border: 1px solid var(--border);
    }
    .chart-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
    .chart-canvas { position: relative; height: 260px; }

    /* Table */
    .table-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .table-card {
      background: var(--card); border-radius: 12px; padding: 20px 24px;
      border: 1px solid var(--border);
    }
    .table-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; padding: 8px 0; border-bottom: 1px solid var(--border); }
    td { font-size: 13px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    td:last-child { text-align: right; font-weight: 600; }
    .url-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

    /* Responsive */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .charts-row, .table-row { grid-template-columns: 1fr; }
      .topbar { padding: 12px 16px; }
      .dashboard { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🦐 虾逛 · <span>数据看板</span></h1>
  <div class="controls">
    <select id="daysPicker">
      <option value="1">今天</option>
      <option value="7" selected>最近 7 天</option>
      <option value="30">最近 30 天</option>
      <option value="90">最近 90 天</option>
      <option value="custom">自定义日期</option>
    </select>
    <input type="date" id="dateFrom" style="display:none">
    <span id="dateSep" style="display:none;color:#666">至</span>
    <input type="date" id="dateTo" style="display:none">
    <button onclick="loadData()">刷新</button>
  </div>
</div>

<div class="dashboard">
  <!-- Stat Cards -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">今日浏览量 (PV)</div>
      <div class="stat-value primary" id="todayPv">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">今日访客数 (UV)</div>
      <div class="stat-value" id="todayUv">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累计浏览量</div>
      <div class="stat-value" id="totalPv">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累计访客数</div>
      <div class="stat-value" id="totalUv">-</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <h3>每日访问趋势</h3>
      <div class="chart-canvas"><canvas id="dailyChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>今日小时分布</h3>
      <div class="chart-canvas"><canvas id="hourlyChart"></canvas></div>
    </div>
  </div>

  <!-- Tables -->
  <div class="table-row">
    <div class="table-card">
      <h3>页面排行</h3>
      <table>
        <thead><tr><th>页面</th><th style="text-align:right">PV / UV</th></tr></thead>
        <tbody id="pagesTable"></tbody>
      </table>
    </div>
    <div class="table-card">
      <h3>访问来源</h3>
      <table>
        <thead><tr><th>来源</th><th style="text-align:right">次数</th></tr></thead>
        <tbody id="referrersTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Region Stats -->
  <div class="table-row">
    <div class="table-card">
      <h3>地区分布</h3>
      <table>
        <thead><tr><th>地区</th><th style="text-align:right">PV / UV</th></tr></thead>
        <tbody id="regionsTable"></tbody>
      </table>
    </div>
    <div class="chart-card">
      <h3>地区访问占比</h3>
      <div class="chart-canvas"><canvas id="regionChart"></canvas></div>
    </div>
  </div>
</div>

<script>
var dailyChartInstance = null;
var hourlyChartInstance = null;
var regionChartInstance = null;

var API_BASE = location.origin;

function makeAuthHeader() {
  // 浏览器自带 Basic Auth 弹窗已经处理了认证
  return {};
}

// 显示/隐藏自定义日期选择器
document.getElementById('daysPicker').addEventListener('change', function() {
  var isCustom = this.value === 'custom';
  document.getElementById('dateFrom').style.display = isCustom ? '' : 'none';
  document.getElementById('dateSep').style.display = isCustom ? '' : 'none';
  document.getElementById('dateTo').style.display = isCustom ? '' : 'none';
  if (!isCustom) loadData();
});

async function loadData() {
  var picker = document.getElementById('daysPicker');
  var url;
  if (picker.value === 'custom') {
    var from = document.getElementById('dateFrom').value;
    var to = document.getElementById('dateTo').value;
    if (!from || !to) return;
    url = API_BASE + '/api/stats?from=' + from + '&to=' + to;
  } else {
    url = API_BASE + '/api/stats?days=' + picker.value;
  }

  try {
    var resp = await fetch(url);
    if (resp.status === 401) {
      alert('认证失败，请刷新页面重新登录');
      return;
    }
    var data = await resp.json();
    renderStats(data);
    renderDailyChart(data.daily);
    renderHourlyChart(data.hourly);
    renderPagesTable(data.pages);
    renderReferrersTable(data.referrers);
    renderRegions(data.regions || []);
  } catch (e) {
    console.error('Failed to load stats:', e);
  }
}

function renderStats(data) {
  document.getElementById('todayPv').textContent = (data.today.pv || 0).toLocaleString();
  document.getElementById('todayUv').textContent = (data.today.uv || 0).toLocaleString();
  document.getElementById('totalPv').textContent = (data.total.pv || 0).toLocaleString();
  document.getElementById('totalUv').textContent = (data.total.uv || 0).toLocaleString();
}

function renderDailyChart(daily) {
  var labels = daily.map(function(d) { return d.day.slice(5); }); // MM-DD
  var pvData = daily.map(function(d) { return d.pv; });
  var uvData = daily.map(function(d) { return d.uv; });

  if (dailyChartInstance) dailyChartInstance.destroy();

  dailyChartInstance = new Chart(document.getElementById('dailyChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'PV', data: pvData, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.08)', fill: true, tension: 0.3, borderWidth: 2, pointRadius: 3 },
        { label: 'UV', data: uvData, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', fill: true, tension: 0.3, borderWidth: 2, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { size: 12 } } } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });
}

function renderHourlyChart(hourly) {
  var labels = []; var data = [];
  for (var i = 0; i < 24; i++) {
    var h = String(i).padStart(2, '0');
    labels.push(h + ':00');
    var found = hourly.find(function(r) { return r.hour === h; });
    data.push(found ? found.pv : 0);
  }

  if (hourlyChartInstance) hourlyChartInstance.destroy();

  hourlyChartInstance = new Chart(document.getElementById('hourlyChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{ label: 'PV', data: data, backgroundColor: 'rgba(231,76,60,0.6)', borderRadius: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0 } },
        x: { ticks: { font: { size: 10 }, maxRotation: 0, callback: function(val, i) { return i % 3 === 0 ? this.getLabelForValue(val) : ''; } } }
      }
    }
  });
}

function renderPagesTable(pages) {
  var tbody = document.getElementById('pagesTable');
  if (!pages.length) { tbody.innerHTML = '<tr><td colspan="2" style="color:#999;text-align:center">暂无数据</td></tr>'; return; }
  tbody.innerHTML = pages.map(function(p) {
    return '<tr><td class="url-cell" title="' + p.url + '">' + p.url + '</td><td>' + p.pv + ' / ' + p.uv + '</td></tr>';
  }).join('');
}

function renderReferrersTable(referrers) {
  var tbody = document.getElementById('referrersTable');
  if (!referrers.length) { tbody.innerHTML = '<tr><td colspan="2" style="color:#999;text-align:center">暂无数据</td></tr>'; return; }
  tbody.innerHTML = referrers.map(function(r) {
    var source = r.source.length > 40 ? r.source.slice(0, 40) + '...' : r.source;
    return '<tr><td class="url-cell" title="' + r.source + '">' + source + '</td><td>' + r.cnt + '</td></tr>';
  }).join('');
}

function renderRegions(regions) {
  var tbody = document.getElementById('regionsTable');
  if (!regions.length) { tbody.innerHTML = '<tr><td colspan="2" style="color:#999;text-align:center">暂无数据</td></tr>'; return; }
  tbody.innerHTML = regions.map(function(r) {
    return '<tr><td>' + r.region + '</td><td>' + r.pv + ' / ' + r.uv + '</td></tr>';
  }).join('');

  // Pie chart
  if (regionChartInstance) regionChartInstance.destroy();
  var colors = ['#e74c3c','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];
  var top = regions.slice(0, 8);
  var otherPv = regions.slice(8).reduce(function(s, r) { return s + r.pv; }, 0);
  var labels = top.map(function(r) { return r.region; });
  var data = top.map(function(r) { return r.pv; });
  if (otherPv > 0) { labels.push('其他'); data.push(otherPv); }

  regionChartInstance = new Chart(document.getElementById('regionChart'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{ data: data, backgroundColor: colors.slice(0, labels.length), borderWidth: 1 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { font: { size: 11 }, padding: 8 } } }
    }
  });
}

document.getElementById('dateFrom').addEventListener('change', loadData);
document.getElementById('dateTo').addEventListener('change', loadData);
loadData();
</script>
</body>
</html>
